<nz-spin [nzSpinning]="loading$ | async">
  <div class="list-page bg-white">
    <nz-page-header [nzBackIcon]="backIconTemplate" [nzGhost]="false">
      <nz-page-header-title>Access Control</nz-page-header-title>
      <nz-page-header-extra>
        <button
          nz-button
          nzType="primary"
          (click)="openModel()"
          [hidden]="displayMode === mode.VIEW">
          <svg-icon src="assets/icon/add-icon.svg"></svg-icon>Assign New
          Application
        </button>
        <!-- <button
          nz-button
          nzType="primary"
          *ngIf="displayMode !== mode.VIEW"
          (click)="resetForm()">
          {{ 'Reset' }}
        </button> -->
        <button
          nz-button
          nzType="primary"
          [disabled]="form.invalid"
          [nzLoading]="loading"
          *ngIf="displayMode !== mode.VIEW"
          (click)="submitForm()">
          {{ 'Update' }}
        </button>
        <button
          nz-button
          nzType="primary"
          [disabled]="form.invalid"
          *ngIf="displayMode === mode.VIEW"
          (click)="changeMode()">
          Edit
        </button>
      </nz-page-header-extra>
      <ng-template #backIconTemplate>
        <svg-icon src="assets/icon/arrow-back.svg"></svg-icon>
      </ng-template>
    </nz-page-header>
    <form
      nz-form
      [nzLayout]="'vertical'"
      (ngSubmit)="submitForm()"
      [formGroup]="form">
      <div nz-row [nzGutter]="[20, 0]" nzAlign="bottom">
        <div nz-col [nzXs]="24" [nzMd]="12" [nzLg]="6">
          <nz-form-item>
            <nz-form-label nzFor="name" [nzRequired]="displayMode !== mode.VIEW"
              >Role Name</nz-form-label
            >
            <nz-form-control
              [nzErrorTip]="nameErrorTpl"
              [nzValidateStatus]="isInvalidField('name')">
              <input
                id="name"
                type="text"
                nz-input
                formControlName="name"
                placeholder="Enter Role" />
              <ng-template #nameErrorTpl let-control>
                <ng-container>
                  {{ getControlErrorMessage('name', 'Role Name') }}
                </ng-container>
              </ng-template>
            </nz-form-control>
          </nz-form-item>
        </div>
        <div nz-col [nzXs]="24" [nzMd]="12" [nzLg]="6">
          <nz-form-item>
            <nz-form-label
              nzFor="description"
              [nzRequired]="displayMode !== mode.VIEW"
              >Enter Description</nz-form-label
            >
            <nz-form-control
              [nzErrorTip]="descriptionErrorTpl"
              [nzValidateStatus]="isInvalidField('description')">
              <input
                id="description"
                type="text"
                formControlName="description"
                nz-input
                placeholder="Enter Description" />
            </nz-form-control>
            <ng-template #descriptionErrorTpl let-control>
              <ng-container>
                {{ getControlErrorMessage('description', 'Description') }}
              </ng-container>
            </ng-template>
          </nz-form-item>
        </div>
        <div nz-col [nzXs]="24" [nzMd]="12" [nzLg]="12">
          <nz-form-item>
            <nz-form-label
              nzFor="isActive"
              [nzRequired]="displayMode !== mode.VIEW"
              >Select Status</nz-form-label
            >
            <nz-form-control
              [nzErrorTip]="isActiveErrorTpl"
              [nzValidateStatus]="isInvalidField('isActive')">
              <nz-radio-group id="isActive" formControlName="isActive">
                <div nz-flex nzAlign="center" nzWrap="wrap" [nzGap]="64">
                  <span nz-radio [nzValue]="true">Active</span>
                  <span nz-radio [nzValue]="false">In Active</span>
                </div>
              </nz-radio-group>
              <ng-template #isActiveErrorTpl let-control>
                <ng-container>
                  {{ getControlErrorMessage('isActive', 'Status') }}
                </ng-container>
              </ng-template>
            </nz-form-control>
          </nz-form-item>
        </div>
      </div>
    </form>
    <nz-collapse nzExpandIconPosition="end">
      <ng-template #customIconTpl let-active="active" class="collapse-icon">
        <svg-icon
          src="assets/icon/collapse-icon.svg"
          class="icon s-18"></svg-icon>
      </ng-template>
      <nz-collapse>
        @for (app of applicationData; track app.applicationId) {
          <nz-collapse-panel
            [nzExtra]="extraButtonTpl"
            [nzExpandedIcon]="customIconTpl"
            [nzActive]="true"
            [nzHeader]="app.applicationName">
            <app-checable-tree
              [nodes]="app.modules"
              [table]="true"
              [form]="form"
              [applicationId]="app.applicationId"
              [view]="displayMode === mode.VIEW"
              (permissionChanged)="
                onPermissionUpdate($event)
              "></app-checable-tree>
            <ng-template #extraButtonTpl>
              <!-- <button *ngIf="app.isRemove"
              nz-button
              nzType="default"
              nzDanger
              class="btn-icon"
              [nzSize]="'small'"
              (click)="addApplication(app)">
              UNDO
            </button> -->
              <button
                *ngIf="applicationData.length > 1"
                nz-button
                nzType="default"
                nzDanger
                class="btn-icon"
                [nzSize]="'small'"
                (click)="removeApplication(app)">
                <svg-icon
                  src="assets/icon/icon-trash.svg"
                  class="icon s-20"></svg-icon>
              </button>
            </ng-template>
          </nz-collapse-panel>
        }
      </nz-collapse>
    </nz-collapse>
  </div>
</nz-spin>
