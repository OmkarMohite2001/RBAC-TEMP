<div class="entry-page theme-page">
  <div class="component-box">
    <h3>Buttons</h3>
    <div class="content-box">
      <div
        nz-flex
        [nzGap]="16"
        nzAlign="center"
        [nzVertical]="flexDirection"
        nzWrap="wrap">
        <button nz-button nzType="primary">Primary</button>
        <button nz-button nzType="primary" [nzGhost]="true">Primary</button>
        <button nz-button nzType="default">Default</button>
        <button nz-button nzType="dashed">Dashed</button>
        <button nz-button nzType="text">Text</button>
        <a nz-button nzType="link">Link</a>
        <button nz-button nzType="primary" nzDanger>Danger</button>
        <button nz-button nzType="default" nzDanger>Danger Border</button>
        <button nz-button class="btn-success">Success</button>
      </div>

      <div
        nz-flex
        [nzGap]="16"
        nzAlign="center"
        [nzVertical]="flexDirection"
        nzWrap="wrap">
        <button nz-button nzType="primary">
          <svg-icon src="assets/icon/sidebar/dashboard.svg"></svg-icon>
          Download
        </button>
        <button nz-button>
          <svg-icon src="assets/icon/sidebar/dashboard.svg"></svg-icon>
          Download
        </button>
        <button nz-button class="btn-tersary">Tersary Button</button>
        <button nz-button class="btn-gray">Gray Button</button>
        <button nz-button class="btn-sky-blue">Sky Blue Button</button>
      </div>

      <div nz-flex [nzGap]="16" nzAlign="center" [nzVertical]="flexDirection">
        <button nz-button nzSize="large">Large</button>
        <button nz-button>Regular</button>
        <button nz-button nzSize="small">Small</button>
      </div>

      <div nz-flex [nzGap]="16" nzAlign="center" [nzVertical]="flexDirection">
        <button nz-button class="btn-tersary btn-icon" [nzSize]="'small'">
          <svg-icon
            src="assets/icon/icon-datepicker.svg"
            class="icon s-20"></svg-icon>
        </button>
        <button
          nz-button
          nzType="default"
          nzDanger
          class="btn-icon"
          [nzSize]="'small'">
          <svg-icon
            src="assets/icon/icon-datepicker.svg"
            class="icon s-20"></svg-icon>
        </button>
      </div>
    </div>
  </div>

  <div class="component-box">
    <h3>Modals</h3>
    <div class="content-box">
      <div nz-flex [nzGap]="16" nzAlign="center">
        <button nz-button [nzType]="'primary'" (click)="showModal()">
          <span>Form Modal</span>
        </button>
      </div>

      <nz-modal
        [(nzVisible)]="isVisible"
        nzTitle="Add Gear Box"
        [nzWidth]="1000"
        [nzClosable]="false"
        [nzMaskClosable]="false"
        nzCentered
        (nzOnCancel)="handleCancel()"
        (nzOnOk)="handleOk()"
        [nzFooter]="modalFooter">
        <ng-container *nzModalContent>
          <p>Content one</p>
          <p>Content two</p>
          <p>Content three</p>
        </ng-container>

        <ng-template #modalFooter>
          <div class="m-footer-left">
            <button nz-button class="btn-gray" (click)="handleCancel()">
              Cancel
            </button>
            <button nz-button class="btn-sky-blue">Reset</button>
          </div>

          <div class="m-footer-left">
            <button nz-button nzType="primary" (click)="handleOk()">
              Save
            </button>
          </div>
        </ng-template>
      </nz-modal>
    </div>
  </div>

  <div class="component-box">
    <h3>Form Controls</h3>
    <div class="content-box">
      <form nz-form class="login-form" [nzLayout]="vertical">
        <div nz-row [nzGutter]="[20, 0]">
          <div nz-col nzXs="24" nzMd="12" nzLg="8">
            <nz-form-item>
              <nz-form-label [nzSm]="6" [nzXs]="24" nzFor="input" nzRequired>
                Input
              </nz-form-label>
              <nz-form-control nzErrorTip="Please input your value!">
                <input
                  type="text"
                  nz-input
                  formControlName="input"
                  placeholder="Enter your value" />
              </nz-form-control>
            </nz-form-item>
          </div>
          <div nz-col nzXs="24" nzMd="12" nzLg="8">
            <nz-form-item>
              <nz-form-label [nzSm]="6" [nzXs]="24" nzFor="select" nzRequired>
                Select Dropdown
              </nz-form-label>
              <nz-form-control nzErrorTip="Please select your value!">
                <nz-select nzAllowClear nzPlaceHolder="Select a person">
                  <nz-option nzLabel="Jack" nzValue="jack"></nz-option>
                  <nz-option nzLabel="Lucy" nzValue="lucy"></nz-option>
                  <nz-option nzLabel="Tom" nzValue="tom"></nz-option>
                </nz-select>
              </nz-form-control>
            </nz-form-item>
          </div>
          <div nz-col nzXs="24" nzMd="12" nzLg="8">
            <nz-form-item>
              <nz-form-label
                [nzSm]="6"
                [nzXs]="24"
                nzFor="datepicker"
                nzRequired>
                Date Picker
              </nz-form-label>
              <nz-form-control nzErrorTip="Please select date!">
                <nz-date-picker nzPlaceHolder="Select Date"></nz-date-picker>
              </nz-form-control>
            </nz-form-item>
          </div>
        </div>
      </form>
    </div>
  </div>
</div>
